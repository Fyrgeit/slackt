<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="./src/style.css" />
        <script type="module" src="./dist/tools.js"></script>
        <title>Slackt - Fyrgeit.se</title>
    </head>
    <body>
        <header>
            <h1>Slackt</h1>
            <h2><a href="index.html">Redigerare</a></h2>
            <h2><a href="viewer.html">Utforskare</a></h2>
            <h2>Verktyg</h2>
            <p>Tillbaka till <a href="https://fyrgeit.se">Fyrgeit.se</a></p>
        </header>

        <div id="menuButtons">
            <button
                class="textButton"
                onclick="document.getElementById('open').click()"
            >
                Öppna
            </button>
            <input type="file" id="open" accept=".json" style="display: none" />
            <button class="textButton" id="save">Spara</button>
            <button class="textButton" id="clear">Rensa</button>
        </div>

        <main class="grow">
            <div class="hcont">
                <label for="selectPerson">Välj person</label>
                <select id="selectPerson"></select>
                <button class="textButton" id="listNetwork">
                    Lista nätverk (behöver inte välja person)
                </button>
                <button class="textButton" id="listFamily">
                    Lista blodssläkt
                </button>
            </div>
            <div id="viewer" class="grow"></div>
        </main>
    </body>
</html>
